name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  api-integration:
    name: API integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API integration tests
        env:
          NODE_ENV: test
          DATABASE_PATH: ${{ runner.temp }}/bmad-api-ci-test.db
          CORS_ORIGIN: http://localhost:5173
        run: npm run test:integration --workspace=api

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npm exec --workspace=e2e -- playwright install --with-deps

      - name: Run E2E tests
        env:
          DATABASE_PATH: ${{ runner.temp }}/bmad-e2e.db
        run: npm run test:e2e
