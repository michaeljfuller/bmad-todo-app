name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  api-integration:
    name: API integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API integration tests
        env:
          NODE_ENV: test
          DATABASE_PATH: ${{ runner.temp }}/bmad-api-ci-test.db
          CORS_ORIGIN: http://localhost:5173
        run: npm run test:integration --workspace=api

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps

      # Start the app stack in the job shell (not Playwright webServer) so migrate/build/preview
      # output is tailed in the log. Playwright’s webServer spawns a child with an empty `log` hook,
      # which often hides the real error behind "Exit code: 1".
      - name: Run E2E tests
        env:
          CI: true
          E2E_REPO_ROOT: ${{ github.workspace }}
          NODE_OPTIONS: --max-old-space-size=4096
          DATABASE_PATH: ${{ runner.temp }}/bmad-e2e.db
          CORS_ORIGIN: http://127.0.0.1:5199
          PLAYWRIGHT_E2E_EXTERNAL_SERVER: "1"
        run: |
          set -euxo pipefail
          cleanup() {
            set +e
            if [ -f e2e-stack.pid ]; then kill "$(cat e2e-stack.pid)" 2>/dev/null || true; fi
            fuser -k 3000/tcp 2>/dev/null || true
            fuser -k 5199/tcp 2>/dev/null || true
            set -e
          }
          trap cleanup EXIT
          rm -f e2e-stack.log
          npm run dev:e2e-stack > e2e-stack.log 2>&1 & echo $! > e2e-stack.pid
          npx wait-on -t 180000 "http://127.0.0.1:5199" || { echo "=== e2e stack log (port 5199 never came up) ==="; cat e2e-stack.log; exit 1; }
          ( cd e2e && npx playwright test ) || { echo "=== e2e stack log (playwright failed) ==="; cat e2e-stack.log; exit 1; }

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: e2e-stack-log
          path: e2e-stack.log
          if-no-files-found: ignore
          retention-days: 7

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30
